# Titanic Dataset Configuration
# Swap this file to run ML-Forge on a different dataset

dataset:
  name: titanic
  train_path: data/train.csv
  test_path: data/test.csv
  target: Survived
  features:
    numeric:
      - Age
      - Fare
      - SibSp
      - Parch
    categorical:
      - Pclass
      - Sex
      - Embarked
    engineered:
      - FamilySize
      - IsAlone
      - Title
      - CabinDeck

splitting:
  strategy: stratified_kfold
  n_splits: 5
  test_size: 0.2
  random_state: 42

models:
  logistic_regression:
    enabled: true
    params:
      C: 1.0
      max_iter: 1000
  random_forest:
    enabled: true
    params:
      n_estimators: 100
      max_depth: 10
  xgboost:
    enabled: true
    params:
      n_estimators: 200
      learning_rate: 0.1
      max_depth: 6
  lightgbm:
    enabled: true
    params:
      n_estimators: 200
      learning_rate: 0.1
      num_leaves: 31
  svm:
    enabled: true
    params:
      C: 1.0
      kernel: rbf

tuning:
  n_trials: 100
  timeout: 600
  sampler: tpe
  pruner: median

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
    - log_loss